name: Validate

# Deterministic quality gate for a Home Assistant custom integration:
#   HACS validation -> hassfest -> ruff -> mypy (strict) -> pytest (>=95% coverage).
#
# RENAME: replace `<your_domain>` in the typecheck and test jobs with your
# integration's domain (the folder under custom_components/). Until you add your
# integration + tests, the mypy and pytest jobs will fail — that is expected for
# a fresh clone of this template.

on:
  push:
  pull_request:

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check custom_components/

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install mypy homeassistant
      - run: mypy custom_components/<your_domain>

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt
      - run: pytest tests/ -v
